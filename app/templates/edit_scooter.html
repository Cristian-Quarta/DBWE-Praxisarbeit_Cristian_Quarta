{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 rounded-4 shadow-sm">
            <div class="card-body p-5">
                <p class="text-uppercase text-muted fw-semibold mb-2">Scooter-Verwaltung</p>
                <h2 class="section-title mb-4">Scooter bearbeiten</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Modell</label>
                        <input name="model" value="{{ scooter.model }}" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Akkustand (%)</label>
                        <input name="battery_level" value="{{ scooter.battery_level }}" type="number" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Standort</label>
                        <input name="location" value="{{ scooter.location }}" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Latitude</label>
                        <input name="latitude" value="{{ scooter.latitude if scooter.latitude is not none else '' }}" type="number" step="any" class="form-control form-control-lg rounded-3">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Longitude</label>
                        <input name="longitude" value="{{ scooter.longitude if scooter.longitude is not none else '' }}" type="number" step="any" class="form-control form-control-lg rounded-3">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preis pro Minute</label>
                        <input name="price_per_minute" value="{{ scooter.price_per_minute }}" type="number" step="0.01" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Basispreis</label>
                        <input name="base_price" value="{{ scooter.base_price }}" type="number" step="0.01" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select form-select-lg rounded-3" required>
                            <option value="available" {% if scooter.status == "available" %}selected{% endif %}>available</option>
                            <option value="maintenance" {% if scooter.status == "maintenance" %}selected{% endif %}>maintenance</option>
                            <option value="rented" {% if scooter.status == "rented" %}selected{% endif %}>rented</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary-custom btn-lg">Änderungen speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
