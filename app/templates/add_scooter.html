{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 rounded-4 shadow-sm">
            <div class="card-body p-5">
                <p class="text-uppercase text-muted fw-semibold mb-2">Scooter-Verwaltung</p>
                <h2 class="section-title mb-4">Neuen Scooter hinzufügen</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Scooter-Code</label>
                        <input name="scooter_code" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">QR-Code</label>
                        <input name="qr_code" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Modell</label>
                        <input name="model" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Akkustand (%)</label>
                        <input type="number" name="battery_level" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Standort</label>
                        <input name="location" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" name="latitude" class="form-control form-control-lg rounded-3">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" name="longitude" class="form-control form-control-lg rounded-3">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preis pro Minute</label>
                        <input type="number" step="0.01" name="price_per_minute" class="form-control form-control-lg rounded-3" value="0.35">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Basispreis</label>
                        <input type="number" step="0.01" name="base_price" class="form-control form-control-lg rounded-3" value="1.50">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select form-select-lg rounded-3">
                            <option value="available">available</option>
                            <option value="maintenance">maintenance</option>
                            <option value="rented">rented</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary-custom btn-lg">Scooter speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
